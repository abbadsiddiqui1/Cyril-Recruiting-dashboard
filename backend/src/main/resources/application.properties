# InternshipTracker Backend Config
# ========================
# Email is sent via the Resend API (https://resend.com), not SMTP.
# Railway and most hosts block outbound SMTP, so this app uses Resend's HTTP API instead.
#
# SETUP:
# 1. Sign up at resend.com using the email you want to send/receive reminders from
# 2. Generate an API key from your Resend dashboard
# 3. Set it as an environment variable named RESEND_API_KEY
#    - Locally: export RESEND_API_KEY=re_your_key_here
#    - On Railway/Render/etc: add it in the platform's environment variables panel
#
# No email or password is stored in this file or anywhere in this repo.

spring.application.name=internshiptracker-backend
server.port=8080

# ===== Database =====
# Default: H2 in file mode. Data lives in ./data/internshiptracker.mv.db and survives restarts.
# No install needed — the file is created automatically on first run.
#
# To use PostgreSQL instead (e.g. Railway/Render), set these env vars and the
# overrides below kick in automatically — no code changes required:
#   DATABASE_URL=jdbc:postgresql://host:5432/dbname
#   DATABASE_USERNAME=...
#   DATABASE_PASSWORD=...
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/internshiptracker}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# Let Hibernate create/update the schema from the entities. Safe for this single-user app.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# H2 web console at http://localhost:8080/h2-console (handy for inspecting data in dev)
spring.h2.console.enabled=true

# Logging
logging.level.com.dashboard=INFO